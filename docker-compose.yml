version: "3.8"

services:
  db:
    image: postgres:15
    container_name: onsitewash-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onsitewash
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: onsitewash-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/onsitewash
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
