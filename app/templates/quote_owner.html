<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>New Quote Request</title>
  </head>
  <body>
    <h2>New Quote Received</h2>

    <h3>Customer Details</h3>
    <ul>
      <li>Name: {{ full_name }}</li>
      <li>Phone: {{ phone }}</li>
      <li>Email: {{ email }}</li>
      <li>Service: {{ service_type }}</li>
      <li>Date: {{ preferred_date }}</li>
      <li>Time: {{ preferred_time }}</li>
    </ul>

    <p>Please contact customer soon.</p>
  </body>
</html>
